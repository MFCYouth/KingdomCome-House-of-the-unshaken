<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Come: House Lookup</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f9f9f9; 
            text-align: center; 
        }
        .search-container {
            display: flex; 
            justify-content: center; 
            align-items: center;
            margin-bottom: 20px;
        }
        input { 
            padding: 12px; 
            width: 70%; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        button { 
            padding: 12px 20px; 
            border: none; 
            background-color: #5D3FD3; 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-left: 5px; 
        }
        button:hover { 
            background-color: #4A2EAD; 
        }
        #results { 
            margin-top: 30px; 
            text-align: left; 
        }
        
        /* Styled Search Result Card */
        .card { 
            background: white; 
            padding: 25px; 
            margin: 15px 0; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            border-left: 8px solid #5D3FD3; 
            text-align: center; 
        }
        .card h3 { 
            margin: 0 0 15px 0; 
            color: #333; 
            font-size: 24px; 
        }
        .info-layout { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        
        /* Crest Image Style */
        .crest-img { 
            max-width: 150px; 
            height: auto; 
            object-fit: contain; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.15)); 
        }
        
        .house-title { 
            font-size: 22px; 
            font-weight: bold; 
            color: #5D3FD3; 
            margin: 5px 0; 
        }
        .house-desc { 
            font-style: italic; 
            color: #555; 
            max-width: 450px; 
            line-height: 1.5; 
            font-size: 15px; 
            white-space: pre-line; 
        }
        .details-box { 
            width: 100%; 
            text-align: left; 
            background: #f4f2ff; 
            padding: 14px; 
            border-radius: 6px; 
            box-sizing: border-box; 
            line-height: 1.6;
        }
        
        /* Discord Button Style */
        .discord-btn { 
            display: inline-block; 
            background-color: #5865F2; 
            color: white; 
            text-decoration: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 15px; 
            transition: background 0.2s; 
        }
        .discord-btn:hover { 
            background-color: #4752C4; 
        }
    </style>
</head>
<body>

    <h2>🏰 Kingdom Come: House Lookup</h2>
    <p>Enter your full name to look up your assignment for <strong>House of The Unshaken</strong>.</p>
    
    <div class="search-container">
        <input type="text" id="searchInp" placeholder="Type your full name...">
        <button onclick="searchHouse()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        // ⚠️ REPLACE WITH YOUR ACTUAL GOOGLE APPS SCRIPT WEB APP URL
        const API_URL = "https://script.google.com/macros/s/AKfycbwo0811R7pUn3gdyAHx51DLSqkGZQfpJcRDAOgIfTqik6wgw4SKTL5_giGB05E4HnoL/exec";

        // 🔗 PASTE YOUR PRIVATE HOUSE DISCORD LINKS HERE
        const discordLinks = {
            "Pillars of Purity": "https://discord.gg/tvEGQUUKu5",
            "Champions of Courage": "https://discord.gg/C2xJpGFQTP",
            "Seekers of Self Mastery": "https://discord.gg/ZvfQ8DrF7n",
            "Keepers of Knowledge": "https://discord.gg/rDvX7CgEnn",
            "Heralds of Hope": "https://discord.gg/v9Ayx2P7Wh",
            "Restorers of Reverence": "https://discord.gg/RnP6RWh7sz",
            "Stewards of Simplicity": "https://discord.gg/xS5AXqd7BX"
        };

        async function searchHouse() {
            const query = document.getElementById('searchInp').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = "<p style='color:#D2143A;'>Please enter a name to search.</p>";
                return;
            }

            resultsDiv.innerHTML = "<p style='color:#777;'>Searching the gathering records...</p>";

            try {
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                resultsDiv.innerHTML = ""; 

                if (data.length === 0) {
                    resultsDiv.innerHTML = "<p>No matches found. Make sure it matches your registration name exactly!</p>";
                    return;
                }

                for (const person of data) {
                    const houseName = person.kingdomComeHouses ? person.kingdomComeHouses.trim() : "";
                    
                    // Explicitly point to the current root directory using "./"
                    const imageSrc = houseName ? `./${encodeURIComponent(houseName)}.png` : './generic-crest.png';
                    const textSrc = houseName ? `./${encodeURIComponent(houseName)}.txt` : '';
                    const discordLink = discordLinks[houseName] || "https://discord.gg/GENERAL_CAMP_INVITE";

                    let descriptionText = "Welcome to the gathering! Connect with your house leadership below.";

                    // Dynamically fetch the text file from the same directory branch
                    if (textSrc) {
                        try {
                            const txtResponse = await fetch(textSrc);
                            if (txtResponse.ok) {
                                descriptionText = await txtResponse.text();
                            } else {
                                console.warn(`Text file not found, defaulting description for: ${houseName}`);
                            }
                        } catch (txtErr) {
                            console.error("Could not fetch description file:", txtErr);
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>Welcome, ${person.fullName}!</h3>
                        
                        <div class="info-layout">
                            <img class="crest-img" src="${imageSrc}" alt="${houseName} Crest" onerror="this.src='./generic-crest.png';">
                            <div class="house-title">${houseName || 'Assignment Pending'}</div>
                            <div class="house-desc">"${descriptionText}"</div>
                        </div>

                        <div class="details-box">
                            <strong>📍 Area / Chapter:</strong> ${person.areaAndChapter || 'N/A'}<br>
                            <strong>🧬 Gender:</strong> ${person.gender || 'N/A'}
                        </div>

                        <a href="${discordLink}" target="_blank" class="discord-btn">
                            💬 Join Your Private House Discord
                        </a>
                    `;
                    resultsDiv.appendChild(card);
                }

            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = "<p style='color:#D2143A;'>Error connecting to the database. Please try again later.</p>";
            }
        }
    </script>
</body>
</html>
