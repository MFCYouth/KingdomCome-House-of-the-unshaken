<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Come: House Lookup</title>
    <style>
        /* Dark gray backdrop with a professional, clean tone */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #1e222b; 
            color: #ffffff;
            text-align: center; 
        }

        /* Typography/Crest Image Header Styling */
.header-img {
    max-width: 220px; /* Restricts the massive 1122px width to a clean, readable size */
    height: auto;     /* Maintains the correct proportions so it doesn't distort */
    margin-top: 30px; /* Gives it breathing room from the top of the browser screen */
    margin-bottom: 15px; /* Sets a clean gap before your subtitle and search bar */
    filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.4)); /* Makes the crest pop off the dark background */
}

        p.subtitle {
            color: #b3b3b3;
            font-size: 15px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        .search-container {
            display: flex; 
            justify-content: center; 
            align-items: center;
            margin-bottom: 30px;
        }

        /* Clean White Input Field */
        input { 
            padding: 14px; 
            width: 70%; 
            border: 2px solid #3a3f4d; 
            border-radius: 6px 0 0 6px; 
            font-size: 16px; 
            box-sizing: border-box; 
            background-color: #ffffff;
            color: #1e222b;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #d4af37; /* Gold accent on focus */
        }

        /* Gold Action Button */
        button { 
            padding: 14px 24px; 
            border: none; 
            background-color: #d4af37; 
            color: #1e222b; 
            border-radius: 0 6px 6px 0; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: background-color 0.2s; 
        }
        button:hover { 
            background-color: #c5a028; 
        }

        #results { 
            margin-top: 30px; 
            text-align: left; 
        }
        
        /* Dark Card with White Content and Gold Border Accent */
        .card { 
            background: #2a2f3b; 
            padding: 30px; 
            margin: 15px 0; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            border-top: 5px solid #d4af37; 
            text-align: center; 
        }
        .card h3 { 
            margin: 0 0 20px 0; 
            color: #ffffff; 
            font-size: 26px; 
            border-bottom: 1px solid #3a3f4d;
            padding-bottom: 10px;
        }
        .info-layout { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 18px; 
            margin-bottom: 25px; 
        }
        
        .crest-img { 
            max-width: 160px; 
            height: auto; 
            object-fit: contain; 
            filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.5)); 
        }
        
        .house-title { 
            font-size: 24px; 
            font-weight: bold; 
            color: #d4af37; 
            margin: 5px 0; 
            letter-spacing: 0.5px;
        }
        .house-desc { 
            font-style: italic; 
            color: #dcdcdc; 
            max-width: 450px; 
            line-height: 1.6; 
            font-size: 15px; 
            white-space: pre-line; 
        }

        /* Meta details boxed cleanly inside the card */
        .details-box { 
            width: 100%; 
            text-align: left; 
            background: #232731; 
            padding: 16px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            line-height: 1.8;
            border-left: 3px solid #d4af37;
            font-size: 15px;
            color: #e5e5e5;
        }
        .details-box strong {
            color: #d4af37;
        }
        
        /* Discord Button Style */
        .discord-btn { 
            display: inline-block; 
            background-color: #5865F2; 
            color: white; 
            text-decoration: none; 
            padding: 14px 28px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 20px; 
            box-shadow: 0 4px 10px rgba(88, 101, 242, 0.3);
            transition: background-color 0.2s, transform 0.1s; 
        }
        .discord-btn:hover { 
            background-color: #4752C4; 
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- Typography Image instead of <h2> Text -->
    <img class="header-img" src="./Kingdom Come.PNG" alt="Kingdom Come" onerror="this.style.display='none';">
    <p class="subtitle">Enter your full name to discover your House assignment.</p>
    
    <div class="search-container">
        <input type="text" id="searchInp" placeholder="Type your full name...">
        <button onclick="searchHouse()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwo0811R7pUn3gdyAHx51DLSqkGZQfpJcRDAOgIfTqik6wgw4SKTL5_giGB05E4HnoL/exec";

        const discordLinks = {
            "Pillars of Purity": "https://discord.gg/tvEGQUUKu5",
            "Champions of Courage": "https://discord.gg/C2xJpGFQTP",
            "Seekers of Self Mastery": "https://discord.gg/ZvfQ8DrF7n",
            "Keepers of Knowledge": "https://discord.gg/rDvX7CgEnn",
            "Heralds of Hope": "https://discord.gg/v9Ayx2P7Wh",
            "Restorers of Reverence": "https://discord.gg/RnP6RWh7sz",
            "Stewards of Simplicity": "https://discord.gg/xS5AXqd7BX"
        };

        async function searchHouse() {
            const query = document.getElementById('searchInp').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = "<p style='color:#e63946; font-weight:bold;'>Please enter a name to search.</p>";
                return;
            }

            resultsDiv.innerHTML = "<p style='color:#b3b3b3;'>Searching the gathering records...</p>";

            try {
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                resultsDiv.innerHTML = ""; 

                if (data.length === 0) {
                    resultsDiv.innerHTML = "<p style='color:#b3b3b3; text-align:center;'>No matches found. Make sure it matches your registration name exactly!</p>";
                    return;
                }

                for (const person of data) {
                    const houseName = person.kingdomComeHouses ? person.kingdomComeHouses.trim() : "";
                    
                    const imageSrc = houseName ? `./${encodeURIComponent(houseName)}.png` : './generic-crest.png';
                    const textSrc = houseName ? `./${encodeURIComponent(houseName)}.txt` : '';
                    const discordLink = discordLinks[houseName] || "https://discord.gg/GENERAL_CAMP_INVITE";

                    let descriptionText = "Connect with your house below.";

                    if (textSrc) {
                        try {
                            const txtResponse = await fetch(textSrc);
                            if (txtResponse.ok) {
                                descriptionText = await txtResponse.text();
                            }
                        } catch (txtErr) {
                            console.error("Could not fetch description file:", txtErr);
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>Welcome, ${person.fullName}!</h3>
                        
                        <div class="info-layout">
                            <img class="crest-img" src="${imageSrc}" alt="${houseName} Crest" onerror="this.src='./generic-crest.png';">
                            <div class="house-title">${houseName || 'Assignment Pending'}</div>
                            <div class="house-desc">"${descriptionText}"</div>
                        </div>

                        <div class="details-box">
                            <strong>📍 Area / Chapter:</strong> ${person.areaAndChapter || 'N/A'}<br>
                        </div>

                        <a href="${discordLink}" target="_blank" class="discord-btn">
                            💬 Join Your Private House Discord
                        </a>
                    `;
                    resultsDiv.appendChild(card);
                }

            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = "<p style='color:#e63946; font-weight:bold;'>Error connecting to the database. Please try again later.</p>";
            }
        }
    </script>
</body>
</html>
