<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Come: House Lookup</title>
    <style>
        /* Modern CSS reset & premium deep slate background */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #1e222b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        /* Flexbox layout to perfectly center the core content vertically and horizontally */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Main app container restriction for ideal readability */
        .content-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* Automatically downscales your massive PNG header perfectly */
        .header-img {
            max-width: 200px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.4));
        }

        h2 {
            font-size: 24px;
            color: #ffffff;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: #b3b3b3;
            font-size: 15px;
            margin: 0 0 25px 0;
        }
        
        /* Clean vertical stack for search inputs on mobile/desktop */
        .search-container {
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            width: 100%;
            gap: 12px;
            margin-bottom: 30px;
        }

        /* Styled Dropdown Cluster Menu */
        select {
            padding: 14px;
            width: 100%;
            border: 2px solid #3a3f4d;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #2a2f3b;
            color: #ffffff;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        select:focus {
            border-color: #d4af37;
        }

        /* Row box combining input and button seamlessly */
        .input-group {
            display: flex;
            width: 100%;
            box-sizing: border-box;
        }

        input { 
            padding: 14px; 
            flex-grow: 1;
            width: 60%;
            border: 2px solid #3a3f4d; 
            border-radius: 6px 0 0 6px; 
            font-size: 16px; 
            box-sizing: border-box; 
            background-color: #ffffff;
            color: #1e222b;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #d4af37; 
        }

        button { 
            padding: 14px 24px; 
            border: none; 
            background-color: #d4af37; 
            color: #1e222b; 
            border-radius: 0 6px 6px 0; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: background-color 0.2s; 
            box-sizing: border-box;
        }
        button:hover { 
            background-color: #c5a028; 
        }

        /* Results container aligns left natively for cleaner card profiles */
        #results { 
            width: 100%;
            margin-top: 10px; 
            text-align: left; 
        }
        
        /* Dark Card Layout with White Text & Gold Accent */
        .card { 
            background: #2a2f3b; 
            padding: 25px; 
            margin: 15px 0; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            border-top: 5px solid #d4af37; 
            text-align: center; 
            box-sizing: border-box;
        }
        .card h3 { 
            margin: 0 0 20px 0; 
            color: #ffffff; 
            font-size: 24px; 
            border-bottom: 1px solid #3a3f4d;
            padding-bottom: 10px;
        }
        .info-layout { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        
        .crest-img { 
            max-width: 140px; 
            height: auto; 
            object-fit: contain; 
            filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.5)); 
        }
        
        .house-title { 
            font-size: 22px; 
            font-weight: bold; 
            color: #d4af37; 
            margin: 5px 0; 
        }
        .house-desc { 
            font-style: italic; 
            color: #dcdcdc; 
            max-width: 450px; 
            line-height: 1.5; 
            font-size: 15px; 
            white-space: pre-line; 
        }

        .details-box { 
            width: 100%; 
            text-align: left; 
            background: #232731; 
            padding: 14px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            line-height: 1.6;
            border-left: 3px solid #d4af37;
            font-size: 15px;
            color: #e5e5e5;
        }
        .details-box strong {
            color: #d4af37;
        }
        
        .discord-btn { 
            display: inline-block; 
            background-color: #5865F2; 
            color: white; 
            text-decoration: none; 
            padding: 14px 24px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 20px; 
            box-shadow: 0 4px 10px rgba(88, 101, 242, 0.3);
            transition: background-color 0.2s, transform 0.1s; 
            width: 100%;
            box-sizing: border-box;
        }
        .discord-btn:hover { 
            background-color: #4752C4; 
        }

        /* 📱 Mobile Specific Scaling Adjustments */
        @media (max-width: 480px) {
            h2 { font-size: 20px; }
            select, input, button { padding: 12px; font-size: 14px; }
            .card { padding: 20px; }
            .card h3 { font-size: 20px; }
            .house-title { font-size: 18px; }
            .house-desc { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="content-container">

            <img class="header-img" src="./KingdomCome.png" alt="Kingdom Come Crest" onerror="this.style.display='none';">

            <h2>🏰 The Calling 🏰</h2>
            <p class="subtitle">Select your Area/Chapter and type your name to discover the house that calls you.</p>
            
            <div class="search-container">
                <select id="clusterSel">
                    <option value="">-- Select Your Area & Chapter --</option>
                    <option value="ALBERTA - Calgary">ALBERTA - Calgary</option>
                    <option value="ALBERTA - Central Alberta">ALBERTA - Central Alberta</option>
                    <option value="ALBERTA - Edmonton">ALBERTA - Edmonton</option>
                    <option value="BRITISH COLUMBIA - Vancouver">BRITISH COLUMBIA - Vancouver</option>
                    <option value="MANITOBA - Steinbach">MANITOBA - Steinbach</option>
                    <option value="MANITOBA - Winnipeg">MANITOBA - Winnipeg</option>
                    <option value="ONTARIO - GTA East">ONTARIO - GTA East</option>
                    <option value="ONTARIO - GTA West">ONTARIO - GTA West</option>
                    <option value="QUEBEC - Montreal">QUEBEC - Montreal</option>
                    <option value="SASKATCHEWAN - Saskatoon">SASKATCHEWAN - Saskatoon</option>
                    <option value="SASKATCHEWAN - Yorkton">SASKATCHEWAN - Yorkton</option>
                </select>

                <div class="input-group">
                    <input type="text" id="searchInp" placeholder="Type your name here...">
                    <button onclick="searchHouse()">Search</button>
                </div>
            </div>

            <div id="results"></div>

        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwo0811R7pUn3gdyAHx51DLSqkGZQfpJcRDAOgIfTqik6wgw4SKTL5_giGB05E4HnoL/exec";

        const discordLinks = {
            "Pillars of Purity": "https://discord.gg/ezxFYndmVC",
            "Champions of Courage": "https://discord.gg/5UHaavad7j",
            "Seekers of Self-Mastery": "https://discord.gg/varamNQMzU",
            "Keepers of Knowledge": "https://discord.gg/yDSrAf5ekd",
            "Heralds of Hope": "https://discord.gg/9N4ZdtrkJJ",
            "Restorers of Reverence": "https://discord.gg/U3dA79by2g",
            "Stewards of Simplicity": "https://discord.gg/jVs4Cpxms9"
        };

        async function searchHouse() {
            const query = document.getElementById('searchInp').value.trim();
            const chosenCluster = document.getElementById('clusterSel').value;
            const resultsDiv = document.getElementById('results');
            
            // Validation: Require both inputs for a highly targeted search
            if (!chosenCluster) {
                resultsDiv.innerHTML = "<p style='color:#e63946; font-weight:bold; text-align:center;'>Please select your Area & Chapter first.</p>";
                return;
            }
            if (!query) {
                resultsDiv.innerHTML = "<p style='color:#e63946; font-weight:bold; text-align:center;'>Please type your name to search.</p>";
                return;
            }

            resultsDiv.innerHTML = "<p style='color:#b3b3b3; text-align:center;'>Searching the gathering records...</p>";

            try {
                // Fetch records matching the user's string query
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                resultsDiv.innerHTML = ""; 

                // Filter results to ensure they ALSO belong to the chosen dropdown cluster
                const filteredData = data.filter(person => {
                    const personCluster = person.areaAndChapter ? person.areaAndChapter.trim().toLowerCase() : "";
                    return personCluster === chosenCluster.toLowerCase();
                });

                if (filteredData.length === 0) {
                    resultsDiv.innerHTML = "<p style='color:#b3b3b3; text-align:center;'>No matches found in that chapter. Double check your spelling or chosen chapter!</p>";
                    return;
                }

                for (const person of filteredData) {
                    const houseName = person.kingdomComeHouses ? person.kingdomComeHouses.trim() : "";
                    
                    const imageSrc = houseName ? `./${encodeURIComponent(houseName)}.png` : 'generic-crest.png';
                    const textSrc = houseName ? `./${encodeURIComponent(houseName)}.txt` : '';
                    const discordLink = discordLinks[houseName] || "https://discord.gg/GENERAL_CAMP_INVITE";

                    let descriptionText = "Your house awaits! Connect with your house below.";

                    if (textSrc) {
                        try {
                            const txtResponse = await fetch(textSrc);
                            if (txtResponse.ok) {
                                descriptionText = await txtResponse.text();
                            }
                        } catch (txtErr) {
                            console.error("Could not fetch description file:", txtErr);
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>Welcome, ${person.fullName}!</h3>
                        
                        <div class="info-layout">
                            <img class="crest-img" src="${imageSrc}" alt="${houseName} Crest" onerror="this.src='generic-crest.png';">
                            <div class="house-title">${houseName || 'Assignment Pending'}</div>
                            <div class="house-desc">"${descriptionText}"</div>
                        </div>

                        <div class="details-box">
                            <strong>📍 Area / Chapter:</strong> ${person.areaAndChapter || 'N/A'}
                        </div>

                        <a href="${discordLink}" target="_blank" class="discord-btn">
                            💬 Join Your Private House Discord
                        </a>
                    `;
                    resultsDiv.appendChild(card);
                }

            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = "<p style='color:#e63946; font-weight:bold; text-align:center;'>Error connecting to the database. Please try again later.</p>";
            }
        }
    </script>
</body>
</html>
